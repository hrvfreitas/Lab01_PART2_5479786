services:

  # ===========================================================================
  # FASTAPI — ETL + API REST
  # Orquestra o pipeline bronze/silver/gold e expõe as queries via REST.
  # ===========================================================================
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: pncp_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL:      "postgresql://postgres:postgres@pncp_postgres:5432/pncp_db"
      CACHE_TTL_SECONDS: "300"
    volumes:
      # Monta os dados e scripts do pipeline dentro do container
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - pncp_net

  # ===========================================================================
  # POSTGRESQL — Model (única fonte de verdade)
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: pncp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       pncp_db
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pncp_data:/var/lib/postgresql/data
    command: >
      postgres
        -c shared_buffers=3GB
        -c effective_cache_size=10GB
        -c work_mem=64MB
        -c maintenance_work_mem=512MB
        -c max_connections=50
        -c checkpoint_completion_target=0.9
        -c wal_buffers=64MB
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c max_worker_processes=6
        -c max_parallel_workers_per_gather=3
        -c max_parallel_workers=6
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pncp_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pncp_net

  # ===========================================================================
  # SUPERSET — View (dashboards conectados diretamente ao PostgreSQL)
  # ===========================================================================
  superset:
    image: apache/superset:latest
    container_name: pncp_superset
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY:     "pncp_lab_secret_5479786_change_me"
      SQLALCHEMY_DATABASE_URI: "postgresql://postgres:postgres@pncp_postgres:5432/superset_meta"
      SUPERSET_LOAD_EXAMPLES:  "false"
      PYTHONPATH:              "/app/pythonpath"
    volumes:
      - superset_home:/app/superset_home
      - ./superset_config.py:/app/pythonpath/superset_config.py:ro
    command: >
      bash -c "
        superset db upgrade &&
        superset fab create-admin
          --username admin
          --firstname Admin
          --lastname PNCP
          --email admin@pncp.lab
          --password admin123 2>/dev/null || true &&
        superset init &&
        superset run -h 0.0.0.0 -p 8088 --with-threads
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 90s
    networks:
      - pncp_net

volumes:
  pncp_data:
  superset_home:

networks:
  pncp_net:
    driver: bridge
