services:

  # ===========================================================================
  # FASTAPI — Controller (ETL + API REST)
  # Build do Dockerfile em ./api/
  # ===========================================================================
  api:
    build:
      context: ./api          # pasta que contém Dockerfile + requirements.txt + main.py
      dockerfile: Dockerfile
    container_name: pncp_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL:      "postgresql://postgres:postgres@pncp_postgres:5432/pncp_db"
      CACHE_TTL_SECONDS: "300"
    volumes:
      - ./data:/app/data        # monta data/ do host dentro do container
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - pncp_net

  # ===========================================================================
  # POSTGRESQL — Model
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: pncp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       pncp_db
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pncp_data:/var/lib/postgresql/data
    command: >
      postgres
        -c shared_buffers=3GB
        -c effective_cache_size=10GB
        -c work_mem=64MB
        -c maintenance_work_mem=512MB
        -c max_connections=50
        -c checkpoint_completion_target=0.9
        -c wal_buffers=64MB
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c max_worker_processes=6
        -c max_parallel_workers_per_gather=3
        -c max_parallel_workers=6
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pncp_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pncp_net

  # ===========================================================================
  # METABASE — View (dashboards — conecta direto no PostgreSQL)
  # ===========================================================================
  metabase:
    image: metabase/metabase:latest
    container_name: pncp_metabase
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      # Banco de metadados do próprio Metabase (usa o mesmo postgres)
      MB_DB_TYPE:     postgres
      MB_DB_DBNAME:   metabase_meta
      MB_DB_PORT:     5432
      MB_DB_USER:     postgres
      MB_DB_PASS:     postgres
      MB_DB_HOST:     pncp_postgres
      # Fuso horário
      JAVA_TIMEZONE:  America/Sao_Paulo
    volumes:
      - metabase_data:/metabase-data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 120s
    networks:
      - pncp_net

# =============================================================================
volumes:
  pncp_data:
  metabase_data:

networks:
  pncp_net:
    driver: bridge
